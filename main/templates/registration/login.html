{% extends 'main/base.html' %}

{% block title %}Увійти{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h3 class="fw-bold mb-4 text-center">Вхід</h3>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Логін</label>
            {{ form.username }}
          </div>
          <div class="mb-3">
            <label class="form-label">Пароль</label>
            {{ form.password }}
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">Увійти</button>
            <a href="{% url 'password_reset' %}" class="btn btn-link">Забули пароль?</a>
          </div>
        </form>
      </div>
    </div>
    <p class="text-center mt-3 small">Ще не маєте акаунта? <a href="{% url 'register' %}">Зареєструватись</a></p>
  </div>
</div>
{% endblock %}
